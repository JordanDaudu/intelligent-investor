name: Build and Push Backend Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Get the code from your repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Login to Docker Hub securely
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3️⃣ Build the backend Docker image
      - name: Build Docker image
        run: |
          docker build -t jordandaudu/ii-backend:latest ./backend

      # 4️⃣ Push the image to Docker Hub
      - name: Push Docker image
        run: |
          docker push jordandaudu/ii-backend:latest